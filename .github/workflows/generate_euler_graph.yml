name: Generate Euler Graph

on:
  schedule:
    # Run every 60 minutes (at the start of every hour)
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab in GitHub UI

jobs:
  update-graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install networkx matplotlib scipy numpy
          
      - name: Run Graph Generator
        run: python euler_graph.py
          
      - name: Deploy Live Asset to graph-assets Branch
        run: |
          mkdir deploy
          cp euler_graph.png deploy/
          cd deploy
          git init
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          git checkout -b graph-assets
          git add euler_graph.png
          git commit -m "Update live planar graph asset"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push -f origin graph-assets
