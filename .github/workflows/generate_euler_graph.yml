name: Generate Euler Graph

on:
  schedule:
    # Run every 12 hours (at 00:00 and 12:00 UTC)
    - cron: '0 */12 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab in GitHub UI

jobs:
  update-graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install networkx matplotlib scipy numpy
          
      - name: Run Graph Generator
        run: python euler_graph.py
          
      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md euler_graph.png
          git commit -m "Auto-generated new planar graph [skip ci]" || exit 0
          git pull --rebase origin main
          git push
